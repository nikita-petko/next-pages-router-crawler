name: Publish output to branch

on:
  workflow_dispatch:

# Allow pushing to the target branch without requiring a personal access token
permissions:
  contents: write

jobs:
  publish:

    # Run for 2 branches:
    strategy:
      matrix:
        target: ["advertise.roblox.com", "create.roblox.com", "test.rbxlabs.net", "create.robloxdev.cn"]

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup the Golang environment with version 1.25.x
        uses: actions/setup-go@v7
        with:
          go-version: 1.25.x
          cache-dependency-path: "src/go.mod"

      - name: Run the build-release make target
        run: make build-release

      - name: Init and Checkout branch
        env:
          TARGET_BRANCH: ${{ matrix.target }}
        run: |
          set -euo pipefail

          mkdir -p "$GITHUB_WORKSPACE/.tmp"
          cd "$GITHUB_WORKSPACE/.tmp"

          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
          git fetch --all || true
          git checkout -b "$TARGET_BRANCH" || true
          git reset --hard "origin/$TARGET_BRANCH" || true

          # Try copy The .build file (buildId cache file if exists) to .cache so we don't rerun on the same buildId
          if [ -f "$GITHUB_WORKSPACE/.tmp/.build" ]; then
            mkdir -p "$GITHUB_WORKSPACE/.cache/${TARGET_BRANCH}"
            cp "$GITHUB_WORKSPACE/.tmp/.build" "$GITHUB_WORKSPACE/.cache/${TARGET_BRANCH}/.build" || true
          fi

      - name: Run crawler
        id: run-crawler
        continue-on-error: true
        run: ./bin/release/linux/x64/next-pages-router-crawler --url "https://${{ matrix.target }}" --pulse --clear-output -v 100 --discord-webhook-uri "${{ secrets.DISCORD_WEBHOOK_URI }}"

      - name: Prepare and push dist to target repo
        if: ${{ steps.run-crawler.outcome == 'success' }}
        env:
          TARGET_BRANCH: ${{ matrix.target }}
        run: |
          set -euo pipefail

          # Ensure output exists
          if [ ! -d "$GITHUB_WORKSPACE/.output" ]; then
            echo "Error: .output/ not found. Make sure generating step produced a .output folder." >&2
            ls -la
            exit 1
          fi

          # Checkout repo
          cd "$GITHUB_WORKSPACE/.tmp"

          # Copy cached buildId file to .tmp so we can commit it to the target branch
          if [ -f "$GITHUB_WORKSPACE/.cache/${TARGET_BRANCH}/.build"
          then
            cp "$GITHUB_WORKSPACE/.cache/${TARGET_BRANCH}/.build" "$GITHUB_WORKSPACE/.tmp/.build" || true
          fi

          git rm -rf . || true

          # Copy dist contents into the root of the target repo
          cp -a "$GITHUB_WORKSPACE/.output/${TARGET_BRANCH}/[project]/." . || true

          git add -A

          # Only commit & push if something changed
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(output): update from $(git rev-parse --short HEAD)"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${TARGET_BRANCH}"
            echo "Pushed updated output to ${{ github.repository }}:${TARGET_BRANCH}"
          else
            echo "No changes in output; nothing to commit"
          fi
